    news2: { title: "角色羈絆頭像惡搞大全：官方玩梗停不下來", category: "catNews", body: `<p>羈絆系統在等級8時會贈送一個「神奇」頭像，每個頭像的名字都是對自家角色的惡搞。</p><table><tr><th>角色</th><th>頭像名</th><th>梗解析</th></tr><tr><td>薄荷</td><td>厚荷</td><td>諧音，簡介「可以不用補考嗎？」</td></tr><tr><td>翳</td><td>—</td><td>惡搞名字本身難認</td></tr><tr><td>法帝婭</td><td>法高婭</td><td>諧音梗，對應雙重人格設定</td></tr><tr><td>阿德勒</td><td>啊啊啊</td><td>因為怎麼稱呼都行</td></tr><tr><td>娜娜莉</td><td>這這莉</td><td>「最有方向感一集」</td></tr><tr><td>早霧</td><td>晚霧</td><td>直接反義</td></tr><tr><td>白藏</td><td>黑藏</td><td>顏色反轉</td></tr><tr><td>小吱</td><td>百日</td><td>對應百日紅，寓意富貴吉祥</td></tr></table>` },
    news3: { title: "支線故事：寵物溝通師詐騙事件", category: "catNews", body: `<p>這是玩家評價最高的支線任務之一，劇情品質被一致認為「比主線還精彩」。</p><h2>故事概要</h2><p>九度C咖啡店的美女店員格蕾絲因思念已故寵物「菲利」，被一位自稱能和寵物靈魂溝通的「異能者」盯上。騙子最終以「通靈儀式」為名，騙走了她珍藏的稀有限定模型。</p><h2>主角的介入</h2><p>主角通過調查發現「通靈盒子」只是一個普通的音樂盒改造品。最終在一場追逐戲中抓住了騙子。</p><h2>任務獎勵</h2><p>一個特殊家具「菲利的項圈」，可放在家中。</p>` },
    news4: { title: "黑羽魔女的小祕密：用水晶球偷看動畫片", category: "catNews", body: `<p>黑羽魔女是遊戲中的人氣NPC。有玩家發現她正用占卜水晶球偷偷看動畫片——而且是哈尼婭愛看的特工題材。被靠近時會慌張地收起來、臉紅、整理頭髮和翅膀。</p><h2>如何觸發</h2><p>在夜晚時段（遊戲內時間20:00-6:00）前往黑羽的家（橋間地區域），不要敲門直接進入即可觸發。每週只能觸發一次。</p>` },
    news5: { title: "遊戲彩蛋全盤點：你能認出幾個致敬？", category: "catNews", body: `<p>《異環》中埋藏了大量對經典作品的致敬。</p><h2>文學與影視</h2><ul><li><strong>「裴廓德」+ 白鯨</strong>：致敬《白鯨》（Moby Dick）</li><li><strong>手錶秒針通訊</strong>：致敬《星際穿越》</li><li><strong>「生存還是毀滅」</strong>：莎士比亞《哈姆雷特》</li><li><strong>斯卡布羅集市</strong>：英國傳統民歌</li></ul><h2>遊戲與動漫</h2><ul><li><strong>撬棍 + 博士</strong>：致敬《半條命》</li><li><strong>夜雀食堂 + 算術教室</strong>：東方同人遊戲 + 琪露諾梗</li><li><strong>潛水用品 +「碧藍之家」</strong>：致敬《碧藍之海》</li></ul>` },
    tips1: { title: "零成本銷星技巧：聯機/試用關卡秒消通緝", category: "catTips", body: `<p>在《異環》中犯罪會積累通緝星級。以下是兩個零成本消除通緝星的技巧。</p><h2>方法一：召喚好友</h2><p>召喚好友進入你的世界，犯罪星級會直接清零。而且聯機狀態下無法犯罪。</p><h2>方法二：進入試用關卡</h2><p>進入任意角色的試用關卡，再退出，犯罪星級同樣清零。這個方法不需要好友在線，最為方便。</p><h2>方法三：躲進安全屋</h2><p>購買任意房產後，進入家中等待約30秒，通緝自動解除。</p>` },
    tips2: { title: "每日必做清單：卜運·祈福·許願·隱藏互動", category: "catTips", body: `<p>每天只需10-15分鐘，做完以下事項可最大化日常收益：</p><ol><li><strong>魔女之家卜運</strong>：橋間地維特海默塔附近找「黑羽」</li><li><strong>願木坡祈福</strong>：新赫蘭德區找「芷蘭」買祈福牌</li><li><strong>納庫佩達之池許願</strong>：繪空町噴泉池投金幣</li><li><strong>隱藏互動×3</strong>：點擊發光物體或隱藏NPC</li><li><strong>異能聯動×1</strong>：觸發一次聯動技能</li><li><strong>探索指南活躍任務</strong>：獲得方斯、環石、經驗</li></ol>` },
    tips3: { title: "安魂曲無限刷突破材料：遠離刷新法詳解", category: "catTips", body: `<p>安魂曲的突破材料需要擊敗特定的野生小怪獲取。以下是無限刷取的方法：</p><ol><li>前往材料怪物的刷新點位</li><li>擊敗怪物後立刻快速遠離現場</li><li>持續遠離直到螢幕出現「黑潮湧動」畫面</li><li>返回刷新點，怪物已經重新出現</li><li>重複以上步驟，無限刷取</li></ol><div class="highlight">注意：不要在怪物死亡動畫結束前遠離，否則可能不觸發刷新。</div>` },
    tips4: { title: "快速賺錢指南：全市保險箱位置彙總", category: "catTips", body: `<p>方斯在中期開始緊缺。以下是全市高收益保險箱位置：</p><table><tr><th>地點</th><th>收益</th></tr><tr><td>米格爾區索雷伊路工地電梯2樓</td><td>5萬+方斯</td></tr><tr><td>米格爾區索雷伊路工地電梯3樓</td><td>5萬+方斯</td></tr><tr><td>火車站倉庫</td><td>3萬+方斯</td></tr><tr><td>繪空町巷子</td><td>2.5萬方斯</td></tr><tr><td>邁達斯弧盤工房二樓</td><td>2萬方斯</td></tr></table>` },
    tips5: { title: "抽卡資源規劃：環石別抽常駐池！", category: "catTips", body: `<p>環石（Orbit）是最珍貴的抽卡資源，錯誤的用法會讓你損失慘重。</p><div class="highlight">環石永遠優先留給限定池！常駐池有50抽自選活動，用免費的「追憶之環」即可。</div><h2>資源規劃建議</h2><ul><li><strong>常駐池</strong>：只用免費送的「追憶之環」抽</li><li><strong>限定池</strong>：環石集中投入，優先拿1覺</li><li><strong>弧盤池</strong>：一般不建議抽，優先用免費S級弧盤替代</li></ul><h2>每月環石收入估算</h2><p>零氪玩家每月約2400-2900環石，約可保底半個限定角色。</p>` }
  },
  en: {
    siteName: "NTE Player Guide", back: "← Back to Home", langName: "English",
    notFoundTitle: "Article Not Found", notFoundDesc: "Please select an article from the home page",
    catGuides: "Guides", catNews: "Stories", catTips: "Tips",
    pageTitle: "NTE Player Guide",
    guides1: { title: "Anima Pull Guide: Analysis, Arc Disc Builds & 4 Outfits", category: "catGuides", body: `<p>Anima is the S-rank Dark DPS featured in the v1.1 limited banner, running May 28 – June 18.</p><h2>Role & Strength</h2><p>Anima is the strongest Dark-element carry in the current meta with an independent resistance multiplier. With Hayagiri (A1) and Daphne (A0), the team can clear Abyss 12 upper half in 33 seconds.</p><div class="highlight">Core mechanic: Nightmare Clone — copies debuffs from one enemy to all nearby targets.</div><h2>Pull Recommendations</h2><ul><li><strong>Meta players</strong>: aim for A1 minimum</li><li><strong>Casual</strong>: A0 is fine for core gameplay</li><li><strong>F2P</strong>: borrow from friends, save Orbits for future</li></ul><h2>Arc Discs</h2><p>Signature disc "The Last Rose" from Nocturne event. Alternative: "Day Off" (free S-rank, +30% ATK).</p><h2>Four Outfits</h2><ul><li><strong>New Moon Lullaby</strong>: free at Bond Lv.10</li><li><strong>Gilded Symphony</strong>: gacha pull</li><li><strong>Elegy of Memories</strong>: shop (discount until July 2)</li><li><strong>Monochrome Rhyme</strong>: shop (discount until July 2)</li></ul>` },
    guides2: { title: "Abyss Floor 11 Budget Teams: Low-Dupe Clear Comps", category: "catGuides", body: `<p>Abyss Floor 11 can be full-starred without Anima. Here are tested budget team options.</p><h2>Team 1: Xun Hypercarry</h2><p>Core: Xun (C1) + Shirakura + Kozue. High single-rotation burst for elite enemies.</p><h2>Team 2: Nanally Quick-Swap</h2><p>Core: Nanally (C0) + Kozue + Shirakura. High swap frequency, forgiving execution.</p><h2>Team 3: Shirakura Solo</h2><p>Shirakura (C1) can solo most high-difficulty content with skilled play. Use dodge to cancel recovery frames.</p>` },
    guides3: { title: "Nanally Hidden Mechanics: E-Swap Buff Lock & Tech", category: "catGuides", body: `<p>Nanally has the highest skill ceiling in the current roster. Mastering her hidden mechanics can boost DPS by 30%+.</p><h2>Mechanic 1: E-Swap Buff Retention</h2><p>Swap characters immediately after pressing E (within ~0.3s window) to retain the Authority buff on Nanally while she's off-field.</p><h2>Mechanic 2: 3A/4A Combo Swap</h2><p>During the 3rd or 4th normal attack, pre-input attack then swap — Nanally stays on-field to finish the combo.</p><h2>Mechanic 3: Ultimate Buff Lock</h2><p>Swap during ultimate animation to lock all active buffs, extending the ultimate to cover 2 full attack strings.</p><h2>Mechanic 4: No-Windup Heavy Attack</h2><p>After normal attack 1/2/3/5, chain directly into a heavy attack with no charge animation.</p>` },
    guides4: { title: "All 14 Free S-Rank Arc Discs: Complete Collection Guide", category: "catGuides", body: `<p>Fourteen S-Rank Arc Discs can be obtained for free.</p><table><tr><th>Disc</th><th>Source</th><th>Best For</th></tr><tr><td>Day Off</td><td>Hidden quest "Eclipse" ×6</td><td>MC (+30% ATK)</td></tr><tr><td>Galaxy Layover</td><td>Login 10 days</td><td>Mizuki</td></tr><tr><td>Thinking Cat</td><td>City Tycoon Lv.21</td><td>Kozue</td></tr><tr><td>Flame Soul Rampage</td><td>Anomaly: Iron Rider</td><td>Hathor</td></tr><tr><td>Good Dog Roams</td><td>Weekly Boss Murphyx</td><td>Hayagiri</td></tr></table>` },
    guides5: { title: "New Character Iloy Preview: First Spirit-Type Healer/Support", category: "catGuides", body: `<p>Iloy is the newly announced S-rank Spirit character, a ranged healer/support expected in a future patch.</p><h2>Role</h2><p>First Spirit-type character. Summons a familiar for coordinated attacks while healing and buffing the team.</p><h2>Skills</h2><ul><li><strong>Normal</strong>: Ranged note attack, heals team on hit</li><li><strong>Skill</strong>: Summons familiar "Melody", 15% team DMG buff while active</li><li><strong>Ultimate</strong>: AoE heal + cleanse + 25% team DMG buff for 10s</li></ul>` },
    news1: { title: "Mint the Catgirl: Never Passes Her Exams", category: "catNews", body: `<p>Mint is NTE's mascot — a blue catgirl who's sweet, combat-capable, and hilarious, but perpetually fails her Bureau exams.</p><h2>Design</h2><p>Soft, slightly chubby blue catgirl with fluffy white ear tufts. Her tail swings with her emotions.</p><h2>Personality</h2><p>Energetic and always causing laughter. Despite failing theory exams, she's a top-tier field agent.</p><h2>Quirk</h2><p>Mint identifies people by scent — she calls the MC "Cocoa" because of their cocoa-like scent.</p>` },
    news2: { title: "Bond Avatar Parodies: Every Character's Meme Name", category: "catNews", body: `<p>At Bond Lv.8, each character gets a "mysterious" avatar with a parodied name.</p><table><tr><th>Char</th><th>Avatar</th><th>Joke</th></tr><tr><td>Mint</td><td>Thick Mint</td><td>"Can I skip the make-up exam?"</td></tr><tr><td>Fatiya</td><td>Fati-YES</td><td>Dual-personality pun</td></tr><tr><td>Adler</td><td>Ah-ah-ah</td><td>No one knows what to call him</td></tr><tr><td>Nanally</td><td>Nanotly</td><td>"Best sense of direction ever"</td></tr><tr><td>Hayagiri</td><td>Yoru-giri</td><td>Morning → Night</td></tr></table>` },
    news3: { title: "Side Story: The Pet Psychic Scam", category: "catNews", body: `<p>Consistently rated the best side quest in NTE — a noir mystery in a coffee shop.</p><h2>Story</h2><p>Grace, a barista at 9°C Coffee, lost her beloved pet "Philly". A fake psychic exploited her grief, scamming her out of a rare limited edition figurine under the guise of a "spirit communication ritual".</p><h2>Resolution</h2><p>The MC investigates and discovers the "spirit box" is just a rigged music box. A chase sequence leads to catching the scammer. Reward: a special furniture item "Philly's Collar".</p>` },
    news4: { title: "Blackfeather Witch's Secret: Anime on the Crystal Ball", category: "catNews", body: `<p>The Blackfeather Witch moonlights as a fortune teller near Witteheimer Tower — but her crystal ball doubles as an anime streaming device.</p><h2>Discovery</h2><p>Enter her home at night (in-game 20:00-6:00) without knocking. You'll catch her watching a spy anime. She panics, blushes, hides the crystal ball, and frantically tidies her hair and wings.</p>` },
    news5: { title: "All Easter Eggs: Moby Dick, Half-Life, Interstellar & More", category: "catNews", body: `<p>NTE is packed with pop-culture references.</p><h2>Literature & Film</h2><ul><li><strong>"Pequod" + white whale</strong>: Moby Dick</li><li><strong>Watch morse-code</strong>: Interstellar</li><li><strong>"To be or not to be"</strong>: Hamlet</li><li><strong>Scarborough Fair</strong>: English folk song</li></ul><h2>Games & Anime</h2><ul><li><strong>Crowbar + doctor</strong>: Half-Life</li><li><strong>Diving gear + "Azure Home" bar</strong>: Grand Blue</li></ul>` },
    tips1: { title: "Zero-Cost Wanted-Star Clear: Co-op & Trial Tricks", category: "catTips", body: `<p>Two methods to instantly clear your wanted level at zero cost.</p><h2>Method 1: Invite a Friend</h2><p>Summoning a friend into your world instantly clears all wanted stars. Plus, wanted levels can't increase in co-op.</p><h2>Method 2: Character Trial</h2><p>Enter any character trial stage and exit immediately. The entire process takes under 5 seconds.</p><h2>Method 3: Safe House</h2><p>Enter your home and wait ~30 seconds for the wanted status to expire naturally.</p>` },
    tips2: { title: "Daily To-Do List: Fortune, Blessing, Wishes & More", category: "catTips", body: `<p>Just 10-15 minutes to maximize daily rewards:</p><ol><li><strong>Fortune at Witch's Home</strong> — Witteheimer Tower area</li><li><strong>Blessing at Prayer Slope</strong> — buy prayer tags from Zhilan</li><li><strong>Wish at Fountain</strong> — throw coins in Nakuperda Pool</li><li><strong>Hidden Interaction ×3</strong> — glowing objects/NPCs</li><li><strong>Anomaly Combo ×1</strong> — trigger one linked skill</li><li><strong>Exploration Guide dailies</strong> — Orbits, XP, currency</li></ol>` },
    tips3: { title: "Anima Infinite Farm: Respawn Trick Explained", category: "catTips", body: `<p>Farm Anima's ascension materials infinitely with this respawn method:</p><ol><li>Go to the monster's spawn location</li><li>Defeat the monster, then immediately sprint away</li><li>Keep moving until "Dark Tide Surge" appears on screen</li><li>Return to the spawn point — the monster has respawned</li><li>Repeat</li></ol><div class="highlight">This uses the game's legitimate Dark Tide respawn mechanic, not a bug. Safe to use.</div>` },
    tips4: { title: "Fast Money Guide: All Safe Locations & Earnings", category: "catTips", body: `<table><tr><th>Location</th><th>Earnings</th></tr><tr><td>Miguel District elevator 2F</td><td>50,000+</td></tr><tr><td>Miguel District elevator 3F</td><td>50,000+</td></tr><tr><td>Train Station Warehouse</td><td>30,000+</td></tr><tr><td>Skyscape Town Alley</td><td>25,000</td></tr><tr><td>Midas Disc Workshop 2F</td><td>20,000</td></tr></table>` },
    tips5: { title: "Don't Spend Orbits on Standard! Gacha Planning 101", category: "catTips", body: `<div class="highlight">Always save Orbits for limited banners! Standard banner has a 50-pull selector — use free Remembrance Orbs only.</div><h2>Monthly Orb Income (F2P)</h2><ul><li>Dailies: ~300</li><li>Abyss full clear: ~600</li><li>Events + maintenance: ~500-1000</li></ul><p>Total: ~2400-2900 Orbits/month for F2P players.</p>` }
  },

    pageTitle: "NTE攻略ステーション",
    guides1: { title: "アニマガチャ完全ガイド", category: "catGuides", body: `<p>アニマ（安魂曲）はv1.1限定ガチャのS級闇属性アタッカー（5/28～6/18）。</p><h2>強さ評価</h2><p>現環境最強の闇属性メインアタッカー。独立耐性乗算を持つ。</p><h2>おすすめ凸数</h2><ul><li><strong>廃課金</strong>：1凸以上（質変点は1凸と6凸）</li><li><strong>微課金</strong>：0凸で十分楽しめる</li></ul><h2>おすすめ弧盤</h2><p>専用弧盤「最後の薔薇」は夜曲イベントで入手。代替：無料S級「休日」（+30%攻撃）。</p><h2>衣装4種</h2><ul><li>新月の子守唄：絆Lv.10で無料</li><li>黄金交響詩：ガチャ</li><li>旧憶の哀歌：ショップ（7/2まで割引）</li><li>白黒童謡：ショップ（7/2まで割引）</li></ul>` },
    guides2: { title: "深淵11層 低凸クリア編成", category: "catGuides", body: `<p>深淵11層はアニマなしでも満星クリア可能。</p><h2>おすすめ編成</h2><ul><li><strong>浔ハイパーキャリー</strong>：浔(1凸)+白藏+小吱</li><li><strong>ナナリー速切</strong>：ナナリー(0凸)+小吱+白藏</li><li><strong>白藏ソロ</strong>：白藏(1凸)で高難度をソロ攻略可能</li></ul>` },
    guides3: { title: "ナナリー隠しメカニズム", category: "catGuides", body: `<p>ナナリーは現バージョンで最も操作難度が高いキャラ。</p><h2>メカニズム4種</h2><ul><li><strong>E切替バフ維持</strong>：E使用後即座に交代でバフ維持</li><li><strong>3A/4A同時交代</strong>：3～4段目で先行入力→交代で同時攻撃</li><li><strong>必殺技バフ固定</strong>：必殺技中に交代でバフを固定化</li><li><strong>無溜め重撃</strong>：通常攻撃1/2/3/5段後、溜めなし重撃可</li></ul>` },
    guides4: { title: "無料S級弧盤14種 入手ルート", category: "catGuides", body: `<p>14種のS級弧盤が無料で入手可能。</p><table><tr><th>弧盤</th><th>入手方法</th></tr><tr><td>休日</td><td>隠しクエスト「日蝕」×6</td></tr><tr><td>銀河滞在</td><td>累計ログイン10日</td></tr><tr><td>考える猫</td><td>都市タイクーンLv.21</td></tr><tr><td>炎魂狂走</td><td>異象依頼「鉄騎強襲」</td></tr><tr><td>良い犬よ</td><td>週ボス マーフィックス</td></tr></table>` },
    guides5: { title: "新キャラ「イロイ」先行解析", category: "catGuides", body: `<p>イロイは新発表のS級霊属性キャラ。遠距離ヒーラー兼サポーター。</p><h2>スキル</h2><ul><li><strong>通常</strong>：遠距離音符攻撃、ヒット時微量回復</li><li><strong>スキル</strong>：使い魔「旋律」召喚、全体与ダメ+15%</li><li><strong>必殺技</strong>：広範囲回復+デバフ解除+全体与ダメ+25%（10秒）</li></ul>` },
    news1: { title: "看板娘ミント徹底解説", category: "catNews", body: `<p>ミントはNTEの看板娘。可愛くて強くて面白い——でも試験は万年赤点。</p><h2>デザイン</h2><p>ふっくらした青い猫娘。耳の内側は白いふわふわ。</p><h2>性格</h2><p>元気いっぱいでいつも笑いを届ける。学科試験は苦手だが実戦能力はトップクラス。</p><h2>癖</h2><p>匂いで人を呼ぶ——主人公のことは「ココア」と呼ぶ。</p>` },

// ===== Language Switcher =====
let currentLang = 'zh-CN';

function switchLang(lang) {
  currentLang = lang;
  document.documentElement.lang = {'zh-CN':'zh-CN','zh-TW':'zh-TW',en:'en',ja:'ja',ko:'ko'}[lang] || lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[currentLang] && i18n[currentLang][key]) {
      el.textContent = i18n[currentLang][key];
    }
  });
  document.getElementById('currentLang').textContent = i18n[currentLang].langName;
  document.querySelectorAll('.lang-option').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.lang === lang);
  });
  document.getElementById('langSwitcher').classList.remove('open');
  try { localStorage.setItem('nte-lang', lang); } catch(e) {}
  // Re-render article with new language
  renderArticle();
}

document.getElementById('langBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('langSwitcher').classList.toggle('open');
});
document.querySelectorAll('.lang-option').forEach(opt => {
  opt.addEventListener('click', (e) => {
    e.stopPropagation();
    switchLang(opt.dataset.lang);
  });
});
document.addEventListener('click', () => {
  document.getElementById('langSwitcher').classList.remove('open');
});

// ===== Article Rendering =====
function renderArticle() {
  const container = document.getElementById('articleContent');
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const t = i18n[currentLang];

  // Update page title
  if (id && t[id] && t[id].title) {
    document.title = t[id].title + ' - ' + t.siteName;
  } else {
    document.title = t.siteName;
  }

  if (!id || !t[id] || !t[id].title) {
    container.innerHTML = `<div class="not-found"><h2>${t.notFoundTitle}</h2><p>${t.notFoundDesc}</p></div>`;
    return;
  }

  const article = t[id];
  const catClass = article.category === 'catGuides' ? 'cat-guides' : article.category === 'catNews' ? 'cat-news' : 'cat-tips';
  const catLabel = t[article.category] || '';

  container.innerHTML = `
    <div class="article-meta">${t.siteName} · ${new Date().toISOString().slice(0,10)}</div>
    <span class="article-category ${catClass}">${catLabel}</span>
    <h1 class="article-title">${article.title}</h1>
    <div class="article-body">${article.body}</div>
  `;
}

// ===== Init =====
(function() {
  let saved;
  try { saved = localStorage.getItem('nte-lang'); } catch(e) {}
  if (saved && i18n[saved]) { currentLang = saved; }
  switchLang(currentLang);
})();
</script>
